version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: SMA_db_2026!
      POSTGRES_DB: social_media_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs

  worker:
    build: ../backend
    env_file:
      - ../.env
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    depends_on:
      - backend
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs

  flower:
    build: ../backend
    env_file:
      - ../.env
    command: celery -A app.core.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - worker

  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  outputs_data:
