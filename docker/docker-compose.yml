version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_media_agent
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  backend:
    build: ../backend
    ports:
      - "8000:8000"
  worker:
    build: ../backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
  flower:
    build: ../backend
    command: celery -A app.core.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
